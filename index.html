<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言表单</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      color: #1a1a1a;
      font-size: 26px;
      margin-bottom: 10px;
    }

    .desc {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .form-item {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #0070f3;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background-color: #0070f3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background-color: #005cc5;
    }

    .submit-btn:active {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>在线留言</h1>
    <p class="desc">留下你的想法，我会尽快回复</p>

    <form id="myForm">
      <div class="form-item">
        <label>你的昵称</label>
        <input type="text" name="name" placeholder="请输入昵称" required>
      </div>

      <div class="form-item">
        <label>留言内容</label>
        <textarea name="msg" placeholder="请输入留言内容" required></textarea>
      </div>

      <button class="submit-btn" type="submit">提交留言</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('myForm')
    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const data = Object.fromEntries(new FormData(form))
      const btn = form.querySelector('.submit-btn')
      
      // 提交中状态
      btn.innerText = '提交中...'
      btn.disabled = true

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          body: JSON.stringify(data)
        })
        const result = await res.json()
        alert(result.message)
        form.reset()
      } catch (err) {
        alert('网络异常，请稍后重试')
      } finally {
        // 恢复按钮
        btn.innerText = '提交留言'
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
